name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # Skill scripts are dependency-free; no install step needed.
      - name: Run tests
        run: node --test tests/*.test.mjs
      - name: Validate rule trace rules
        run: node skills/rule-trace/scripts/validate-rules.mjs
